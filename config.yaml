project_name: Persistent Signal Anomaly

input:
  file_path: data/input/Telemetry_X_ATP_last7days_20260622.csv.gz
  compression: gzip
  separator: "\t"
  chunk_size: 100000
  max_rows:

output:
  file_path: output/anomaly_report.csv

# The source file is tab-delimited and uses telecom column names.
# These mappings keep the rule engine limited to Excel-style columns Q to U.
monitored_columns:
  Q: SINR
  R: RSSI
  S: RSRQ
  T: SYS_SUB_MODE
  U: TIMESTAMP

normal_reason: All monitored signal parameters are within acceptable limits.

rules:
  persistent_radio_degradation:
    id: RULE-001
    enabled: true
    anomaly_name: Persistent Poor Signal
    severity: High
    sinr_max: 0
    rssi_min: -65
    rsrq_max: -12

  severe_interference:
    id: RULE-002
    enabled: true
    anomaly_name: Sustained Radio Interference
    severity: High
    sinr_max: 0
    rsrq_max: -10

  excessive_noise:
    id: RULE-003
    enabled: true
    anomaly_name: Excessive Radio Noise
    severity: Medium
    rssi_min: -60
    sinr_max: 3

  poor_signal_quality:
    id: RULE-004
    enabled: true
    anomaly_name: Poor Signal Quality
    severity: Medium
    rsrq_max: -14
    sinr_max: 8

  invalid_measurement:
    id: RULE-005
    enabled: true
    anomaly_name: Invalid Signal Measurement
    severity: Low
