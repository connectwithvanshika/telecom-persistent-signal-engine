name: Telecom Persistent Signal Engine

input_file: data/input/Telemetry_X_ATP_last7days_20260622.csv

output_file: output/anomaly_report.csv

rules:

  weak_coverage:
    enabled: true
    threshold: -110
    severity: High
    anomaly_name: Weak Coverage Anomaly

  radio_interference:
    enabled: true
    threshold: 0
    severity: High
    anomaly_name: Radio Interference Anomaly

  poor_signal_quality:
    enabled: true
    threshold: -15
    severity: Medium
    anomaly_name: Poor Signal Quality Anomaly

  radio_noise:
    enabled: true
    threshold: -55
    severity: Medium
    anomaly_name: Radio Noise Anomaly

  missing_pci:
    enabled: true
    severity: Critical
    anomaly_name: LTE Configuration Anomaly

  missing_cellid:
    enabled: true
    severity: Critical
    anomaly_name: Cell Identification Anomaly

  missing_band:
    enabled: true
    severity: Low
    anomaly_name: Band Configuration Anomaly

  invalid_network_mode:
    enabled: true
    allowed:
      - LTE
      - NR
    severity: Low
    anomaly_name: Network Mode Anomaly